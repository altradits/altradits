root = ".."
tmp_dir = "server/tmp"

[build]
  cmd = "go build -o ./server/tmp/altradits-api ./server/cmd/api"
  bin = "./server/tmp/altradits-api"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "testdata", "database", "node_modules", ".next", ".gomodcache"]
  include_ext = ["go"]
  exclude_regex = ["_test\\.go"]

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
