events { worker_connections 1024; }

http {
    upstream altradits_cluster {
        # Docker DNS resolves 'forge-app' to all running container IPs
        server forge-app:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://altradits_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}