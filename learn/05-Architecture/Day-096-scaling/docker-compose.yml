services:
  forge-app:
    build: .
    deploy:
      replicas: 3 # Start 3 identical copies of the Forge
    networks:
      - forge-net

  load-balancer:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - forge-app
    networks:
      - forge-net

networks:
  forge-net: