<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altradits | Dash</title>
</head>
<body style="font-family: sans-serif; padding: 40px; background: #f4f4f9;">
    <h1>System ID: {{ .SystemID }}</h1>
    <hr>
    <h2>Welcome back, Founder {{ .FounderName }}</h2>
    
    <div style="background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd;">
        <p>Current Vault Balance: <strong>${{ .Balance }}</strong></p>
        
        {{ if .IsSecure }}
            <p style="color: green;">✔ Security Protocols: ENFORCED</p>
        {{ else }}
            <p style="color: red;">✘ Security Protocols: BYPASSED (Warning)</p>
        {{ end }}
    </div>
</body>
</html>
