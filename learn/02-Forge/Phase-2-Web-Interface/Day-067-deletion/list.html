{{ range . }}
<div class="log-row flex justify-between items-center bg-slate-900 p-4 rounded-lg border border-slate-800">
    <div>
        <span class="text-xs text-slate-500 font-mono mr-3">{{ .ID }}</span>
        <span class="text-sm">{{ .Message }}</span>
    </div>
    
    <button hx-delete="/log/{{ .ID }}" 
            hx-target="closest .log-row" 
            hx-swap="outerHTML swap:500ms"
            class="text-slate-600 hover:text-red-500 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
        </svg>
    </button>
</div>
{{ end }}
