<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Define the fade-out and shrink animation */
        .log-row.htmx-swapping {
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.5s ease-out;
        }
    </style>
</head>
<body class="bg-slate-950 text-white p-12">
    <div class="max-w-xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Security Event Log</h1>
        <div id="log-container" class="space-y-2">
            {{ template "list.html" . }}
        </div>
    </div>
</body>
</html>
