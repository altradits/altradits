<div class="flex justify-between items-center mb-4">
    <span class="text-xs uppercase font-bold tracking-widest text-slate-500">System Status</span>
    <span class="px-2 py-1 rounded text-[10px] font-bold {{ if eq .Status "Healthy" }} bg-emerald-900/30 text-emerald-400 {{ else }} bg-amber-900/30 text-amber-400 {{ end }}">
        {{ .Status }}
    </span>
</div>

<div class="space-y-4">
    <div>
        <div class="flex justify-between text-sm mb-1">
            <span>CPU Load</span>
            <span class="font-mono">{{ .CPUUsage }}%</span>
        </div>
        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
            <div class="bg-emerald-500 h-full transition-all duration-1000" style="width: {{ .CPUUsage }}%"></div>
        </div>
    </div>
    
    <div class="text-xs text-slate-500">
        Uptime: <span class="text-slate-300 font-mono">{{ .Uptime }}</span>
    </div>
</div>
