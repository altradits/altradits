{{ range . }}
<tr class="border-b border-slate-800 hover:bg-slate-800/30">
    <td class="p-4 text-center">
        <input type="checkbox" name="tx_ids" value="{{ .ID }}" class="accent-emerald-500">
    </td>
    <td class="p-4 font-mono">{{ .ID }}</td>
    <td class="p-4">
        <span class="px-2 py-1 rounded text-xs font-bold {{ if eq .Status "Approved" }} bg-emerald-900 text-emerald-400 {{ else }} bg-amber-900 text-amber-400 {{ end }}">
            {{ .Status }}
        </span>
    </td>
</tr>
{{ end }}
