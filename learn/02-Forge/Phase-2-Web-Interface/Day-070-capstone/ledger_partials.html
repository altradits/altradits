{{ define "ledger-rows" }}
{{ range . }}
<tr class="border-b border-slate-800/50 hover:bg-slate-800/20 transition group">
    <td class="py-4"><input type="checkbox" name="tx_ids" value="{{ .ID }}" class="accent-emerald-500"></td>
    <td class="py-4 font-mono text-sm group-hover:text-emerald-400 transition">{{ .ID }}</td>
    <td class="py-4 font-bold">${{ .Amount }}</td>
    <td class="py-4">
        <span class="text-[10px] px-2 py-1 rounded font-bold {{ if eq .Status "Approved" }} bg-emerald-900 text-emerald-400 {{ else }} bg-amber-900 text-amber-400 {{ end }}">
            {{ .Status }}
        </span>
    </td>
</tr>
{{ end }}
{{ end }}
