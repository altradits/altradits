<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* HTMX automatically toggles opacity on elements with this class */
        .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; pointer-events: none; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator { opacity: 1; }
    </style>
</head>
<body class="bg-slate-950 text-white p-12">
    <div class="max-w-md mx-auto text-center">
        <h1 class="text-2xl font-bold mb-4">Security Audit</h1>
        <p class="text-slate-500 mb-8 text-sm">Initiate a deep-scan of vault protocols.</p>

        <div id="audit-frame" class="bg-slate-900 border border-slate-800 p-8 rounded-2xl relative overflow-hidden">
            <!-- The Loading Overlay (Indicator) -->
            <div id="loading-bar" class="htmx-indicator absolute inset-0 bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center z-10">
                <div class="w-48 h-1 bg-slate-800 rounded-full overflow-hidden">
                    <div class="h-full bg-emerald-500 animate-[load_2s_ease-in-out_infinite]"></div>
                </div>
                <p class="text-xs text-emerald-500 mt-4 font-mono uppercase tracking-widest">Reconciling Ledger...</p>
            </div>

            <!-- Content Area -->
            <div id="audit-content">
                <button hx-post="/run-audit" 
                        hx-target="#audit-content" 
                        hx-indicator="#loading-bar"
                        class="bg-emerald-600 hover:bg-emerald-500 px-8 py-3 rounded-xl font-bold transition-all transform active:scale-95">
                    Start System Audit
                </button>
            </div>
        </div>
    </div>

    <script>
        // Custom Tailwind Animation
        window.tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        load: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' }
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
