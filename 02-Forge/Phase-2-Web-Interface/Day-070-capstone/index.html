<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-8">
    <div class="max-w-5xl mx-auto grid grid-cols-12 gap-6">
        <!-- Sidebar/Status -->
        <div class="col-span-3 space-y-6">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                <h1 class="text-emerald-500 font-bold tracking-tighter mb-4 italic">ALTRADITS FORGE</h1>
                <div hx-get="/health" hx-trigger="every 3s" hx-swap="innerHTML">Connecting...</div>
            </div>
            <button hx-post="/bulk-approve" hx-target="#ledger-body" hx-include="[name='tx_ids']"
                    class="w-full bg-emerald-600 py-3 rounded-xl font-bold shadow-lg shadow-emerald-900/20">
                Approve Selected
            </button>
        </div>

        <!-- Main Ledger -->
        <div class="col-span-9 bg-slate-900 rounded-2xl border border-slate-800 p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Transaction Ledger</h2>
                <input type="text" name="search" placeholder="Quick Search ID..." 
                       hx-post="/search" hx-trigger="keyup changed delay:200ms" hx-target="#ledger-body"
                       class="bg-slate-950 border border-slate-800 p-2 rounded-lg text-sm focus:border-emerald-500 outline-none">
            </div>

            <table class="w-full text-left">
                <thead class="text-xs text-slate-500 uppercase border-b border-slate-800">
                    <tr>
                        <th class="pb-4">Select</th>
                        <th class="pb-4">ID</th>
                        <th class="pb-4">Amount</th>
                        <th class="pb-4">Status</th>
                    </tr>
                </thead>
                <tbody id="ledger-body">
                    {{ template "ledger-rows" . }}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
