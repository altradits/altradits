<table class="w-full text-left border-collapse bg-slate-900 rounded-lg overflow-hidden">
    <thead class="bg-slate-800 text-slate-400 text-xs uppercase">
        <tr>
            <th class="p-4">Transaction ID</th>
            <th class="p-4">Recipient</th>
            <th class="p-4 text-right">Amount</th>
        </tr>
    </thead>
    <tbody>
        {{ range . }}
        <tr class="border-b border-slate-800 hover:bg-slate-800/50 transition">
            <td class="p-4 font-mono text-emerald-500">{{ .ID }}</td>
            <td class="p-4">{{ .Target }}</td>
            <td class="p-4 text-right">${{ .Amount }}</td>
        </tr>
        {{ else }}
        <tr>
            <td colspan="3" class="p-8 text-center text-slate-500 italic">No matching records found.</td>
        </tr>
        {{ end }}
    </tbody>
</table>
