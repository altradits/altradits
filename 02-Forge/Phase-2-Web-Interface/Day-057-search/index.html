<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-12">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-emerald-400">Ledger Search</h1>
        
        <div class="relative mb-6">
            <input type="text" name="search" 
                   placeholder="Search ID or Recipient..." 
                   class="w-full bg-slate-900 border border-slate-700 p-4 rounded-lg focus:outline-none focus:border-emerald-500"
                   hx-post="/search" 
                   hx-trigger="keyup changed delay:300ms" 
                   hx-target="#search-results" 
                   hx-indicator="#spinner">
            
            <!-- A loading indicator for the Founder -->
            <div id="spinner" class="htmx-indicator absolute right-4 top-4">
                <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-emerald-500"></div>
            </div>
        </div>

        <div id="search-results">
            {{ template "results.html" . }}
        </div>
    </div>
</body>
</html>
