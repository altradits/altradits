<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tag-btn.active { background-color: #10b981; color: white; border-color: #10b981; }
    </style>
</head>
<body class="bg-slate-950 text-white p-12">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-2">Categorize Transaction</h1>
        <p class="text-slate-500 text-sm mb-6">TX-8829: $1,200.00</p>

        <div class="flex gap-2" id="tag-group">
            <!-- Optimistic Trigger: Toggle class instantly on click -->
            <button hx-post="/set-tag" 
                    hx-vals='{"tag": "Business"}'
                    hx-target="#server-status"
                    hx-on:click="this.classList.add('active');"
                    class="tag-btn border border-slate-700 px-4 py-2 rounded-lg text-sm transition-all duration-75">
                Business
            </button>

            <button hx-post="/set-tag" 
                    hx-vals='{"tag": "Personal"}'
                    hx-target="#server-status"
                    hx-on:click="this.classList.add('active');"
                    class="tag-btn border border-slate-700 px-4 py-2 rounded-lg text-sm transition-all duration-75">
                Personal
            </button>
        </div>

        <!-- Silent feedback -->
        <div id="server-status" class="mt-6 text-[10px] text-slate-600 uppercase tracking-widest">
            Ready
        </div>
    </div>
</body>
</html>
