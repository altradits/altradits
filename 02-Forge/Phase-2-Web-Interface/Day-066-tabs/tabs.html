{{ define "vault" }}
<div class="animate-in slide-in-from-left-2 duration-300">
    <h2 class="text-xl font-bold mb-4">Liquidity Overview</h2>
    <div class="p-6 bg-slate-900 rounded-xl border border-slate-800">
        <p class="text-emerald-500 font-mono text-3xl">$1,450,000.00</p>
    </div>
</div>
{{ end }}

{{ define "audit" }}
<div class="animate-in slide-in-from-left-2 duration-300">
    <h2 class="text-xl font-bold mb-4">System Audit Logs</h2>
    <ul class="space-y-2 text-slate-400 text-sm">
        <li>[20:15] Access granted to Founder.</li>
        <li>[19:40] Automated sweep completed.</li>
    </ul>
</div>
{{ end }}

{{ define "settings" }}
<div class="animate-in slide-in-from-left-2 duration-300">
    <h2 class="text-xl font-bold mb-4">Forge Settings</h2>
    <label class="flex items-center gap-2">
        <input type="checkbox" checked> Enable Dark Mode (Default)
    </label>
</div>
{{ end }}
