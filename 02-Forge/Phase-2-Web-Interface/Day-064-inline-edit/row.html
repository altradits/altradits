<tr id="contact-{{ .ID }}" class="group hover:bg-slate-800/50 transition">
    <td class="p-4 font-bold text-emerald-400">{{ .Name }}</td>
    <td class="p-4 text-slate-400">{{ .Email }}</td>
    <td class="p-4 text-right">
        <button hx-get="/contact/{{ .ID }}/edit" 
                hx-target="closest tr" 
                hx-swap="outerHTML"
                class="opacity-0 group-hover:opacity-100 bg-slate-700 px-3 py-1 rounded text-xs transition">
            Edit
        </button>
    </td>
</tr>
