<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-12">
    <div class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Pending Transactions</h1>
            <!-- The Bulk Button -->
            <button hx-post="/bulk-approve" 
                    hx-target="#ledger-body" 
                    hx-include="[name='tx_ids']"
                    class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded font-bold transition">
                Approve Selected
            </button>
        </div>

        <table class="w-full bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
            <thead class="bg-slate-800 text-slate-400 text-xs uppercase">
                <tr>
                    <th class="p-4 w-10 text-center">
                        <input type="checkbox" onclick="toggleAll(this)" class="accent-emerald-500">
                    </th>
                    <th class="p-4">Transaction ID</th>
                    <th class="p-4">Status</th>
                </tr>
            </thead>
            <tbody id="ledger-body">
                {{ template "ledger_rows.html" . }}
            </tbody>
        </table>
    </div>

    <script>
        function toggleAll(source) {
            checkboxes = document.getElementsByName('tx_ids');
            for(var i=0; n=checkboxes[i]; i++) n.checked = source.checked;
        }
    </script>
</body>
</html>
